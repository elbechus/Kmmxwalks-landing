document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

oot {\n  /* ---------- Brand ---------- */\n  --kmmx-magenta:     #F01589;   /* signature — logo dot, primary CTA, metro line */\n  --kmmx-black:       #0A0A0A;   /* app background */\n  --kmmx-ink:         #1D1D1B;   /* logo black / near-black */\n  --kmmx-white:       #FFFFFF;\n\n  /* ---------- Neutral scale (on black) ---------- */\n  --n-0:  #000000;\n  --n-05: #0A0A0A;\n  --n-10: #141414;\n  --n-15: #1A1A1A;   /* card surface */\n  --n-20: #242424;   /* card hover / secondary surface */\n  --n-30: #2E2E2E;\n  --n-40: #3A3A3A;\n  --n-50: #5A5A5A;\n  --n-60: #7A7A7A;\n  --n-70: #9A9A9A;   /* secondary text */\n  --n-80: #BDBDBD;\n  --n-90: #E3E3E3;\n  --n-100:#FFFFFF;\n\n  /* ---------- Semantic surfaces ---------- */\n  --bg:          var(--kmmx-black);\n  --surface:     var(--n-15);\n  --surface-2:   var(--n-20);\n  --surface-3:   var(--n-30);\n  --overlay:     rgba(0,0,0,.55);\n\n  /* ---------- Semantic text ---------- */\n  --fg-1: var(--kmmx-white);     /* primary */\n  --fg-2: var(--n-70);           /* secondary / body on dark */\n  --fg-3: var(--n-50);           /* tertiary / captions */\n  --fg-inv: var(--kmmx-ink);     /* on magenta / on light */\n\n  /* ---------- Borders ---------- */\n  --border-subtle: rgba(255,255,255,.08);\n  --border-strong: rgba(255,255,255,.16);\n\n  /* ---------- Accents (used sparingly) ---------- */\n  --accent-magenta: var(--kmmx-magenta);\n  --accent-magenta-ink: var(--fg-1);\n\n  /* ---------- Map categories (from the Mapa metro poster) ---------- */\n  --cat-tacos:    #0A0A0A;   /* black chip w/ white text */\n  --cat-pizza:    #0A0A0A;\n  --cat-bars:     #F01589;   /* magenta chip */\n  --cat-seafood:  #F01589;\n  --cat-cantinas: #0A0A0A;\n  --cat-favorite: #F01589;\n\n  /* ---------- Type families ---------- */\n  --font-display:  \"Styrene A\", \"Styrene A Bold\", \"Inter\", system-ui, sans-serif;\n  --font-serif:    \"Awesome Serif\", \"Playfair Display\", Georgia, serif;\n  --font-body:     \"Inter\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n  --font-mono:     ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* ---------- Type scale ---------- */\n  /* Display (Styrene A Bold, UPPERCASE, tight tracking) — used for big headers */\n  --fs-display-xl: 56px;   --lh-display-xl: 0.95;\n  --fs-display-lg: 40px;   --lh-display-lg: 0.98;\n  --fs-display-md: 32px;   --lh-display-md: 1.00;\n  --fs-display-sm: 24px;   --lh-display-sm: 1.05;\n\n  /* Body */\n  --fs-body-lg: 17px;  --lh-body-lg: 1.45;\n  --fs-body:    15px;  --lh-body:    1.50;\n  --fs-body-sm: 13px;  --lh-body-sm: 1.45;\n  --fs-caption: 11px;  --lh-caption: 1.35;\n\n  /* ---------- Spacing (4px base) ---------- */\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  20px;\n  --sp-6:  24px;\n  --sp-8:  32px;\n  --sp-10: 40px;\n  --sp-12: 48px;\n  --sp-16: 64px;\n\n  /* ---------- Radii ---------- */\n  --r-sm: 8px;\n  --r-md: 14px;\n  --r-lg: 20px;      /* cards */\n  --r-xl: 28px;      /* big CTAs / sheets */\n  --r-pill: 999px;   /* primary button is a full pill */\n\n  /* ---------- Shadows ---------- */\n  --shadow-pop: 0 12px 32px -12px rgba(240, 21, 137, 0.45);\n  --shadow-card: 0 8px 24px -12px rgba(0, 0, 0, 0.6);\n\n  /* ---------- Motion ---------- */\n  --ease-out: cubic-bezier(.22, 1, .36, 1);\n  --ease-in:  cubic-bezier(.55, 0, .68, 0);\n  --dur-fast: 140ms;\n  --dur-med:  220ms;\n  --dur-slow: 360ms;\n}\n\n/* ==========================================================================\n   Semantic typography classes\n   ========================================================================== */\n\nhtml, body { background: var(--bg); color: var(--fg-1); font-family: var(--font-body); }\n\n.km-display-xl,\n.km-display-lg,\n.km-display-md,\n.km-display-sm {\n  font-family: var(--font-display);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: -0.01em;\n  line-height: var(--lh-display-md);\n  color: var(--fg-1);\n}\n.km-display-xl { font-size: var(--fs-display-xl); line-height: var(--lh-display-xl); }\n.km-display-lg { font-size: var(--fs-display-lg); line-height: var(--lh-display-lg); }\n.km-display-md { font-size: var(--fs-display-md); line-height: var(--lh-display-md); }\n.km-display-sm { font-size: var(--fs-display-sm); line-height: var(--lh-display-sm); }\n\n.km-serif-tall {\n  font-family: var(--font-serif);\n  font-weight: 700;\n  line-height: 0.92;\n  letter-spacing: -0.02em;\n}\n\n.km-h1 { font: 700 var(--fs-display-lg)/var(--lh-display-lg) var(--font-display); text-transform: uppercase; letter-spacing: -0.01em; }\n.km-h2 { font: 700 var(--fs-display-md)/var(--lh-display-md) var(--font-display); text-transform: uppercase; letter-spacing: -0.01em; }\n.km-h3 { font: 700 var(--fs-display-sm)/var(--lh-display-sm) var(--font-display); text-transform: uppercase; letter-spacing: 0; }\n\n.km-body-lg { font: 400 var(--fs-body-lg)/var(--lh-body-lg) var(--font-body); color: var(--fg-1); }\n.km-body    { font: 400 var(--fs-body)/var(--lh-body) var(--font-body); color: var(--fg-1); }\n.km-body-sm { font: 400 var(--fs-body-sm)/var(--lh-body-sm) var(--font-body); color: var(--fg-2); }\n.km-caption { font: 500 var(--fs-caption)/var(--lh-caption) var(--font-body); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-2); }\n\n.km-label   { font: 700 var(--fs-body-sm)/1.2 var(--font-display); text-transform: uppercase; letter-spacing: 0.02em; }\n\n.km-eyebrow {\n  font: 600 11px/1 var(--font-body);\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--kmmx-magenta);\n}\n\n/* ==========================================================================\n   Primitives\n   ========================================================================== */\n\n.km-dot { display:inline-block; width:.6em; height:.6em; border-radius:50%; background:var(--kmmx-magenta); vertical-align:middle; }\n\n.km-btn {\n  font: 700 17px/1 var(--font-display);\n  text-transform: none;\n  letter-spacing: 0;\n  border-radius: var(--r-pill);\n  padding: 18px 28px;\n  display: inline-flex; align-items: center; gap: 12px;\n  border: none; cursor: pointer;\n  transition: transform var(--dur-fast) var(--ease-out), background-color var(--dur-fast) var(--ease-out);\n}\n.km-btn-primary { background: var(--kmmx-magenta); color: var(--fg-1); }\n.km-btn-primary:hover { background: var(--kmmx-magenta); filter: brightness(0.9); }\n.km-btn-primary:active { transform: scale(0.98); }\n\n.km-btn-dark { background: var(--kmmx-ink); color: var(--fg-1); }\n.km-btn-dark:hover { background: #2a2a28; }\n\n.km-card {\n  background: var(--surface);\n  border-radius: var(--r-lg);\n  padding: var(--sp-5) var(--sp-5);\n}\n\n.km-pill-chip {\n  display:inline-flex; align-items:center; padding: 6px 14px;\n  background: var(--kmmx-magenta); color: var(--fg-1);\n  font: 700 12px/1 var(--font-display); text-transform: uppercase; letter-spacing: 0.04em;\n  border-radius: 6px;\n}\n.km-pill-chip.dark { background: var(--kmmx-ink); }\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: var(--kmmx-black); color: var(--fg-1); -webkit-font-smoothing: antialiased; }\n  ::selection { background: var(--kmmx-magenta); color: #fff; }\n\n  :root {\n    --page-pad: clamp(24px, 5vw, 96px);\n  }\n\n  a { color: #fff; text-decoration: underline; text-decoration-color: rgba(240,21,137,0.6); text-underline-offset: 3px; }\n  a:hover { text-decoration-color: var(--kmmx-magenta); }\n\n  /* ===== NAV ===== */\n  .nav {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 22px var(--page-pad);\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n  }\n  .nav-brand {\n    font-family: var(--font-display);\n    text-transform: uppercase;\n    font-size: 18px; letter-spacing: 0.02em;\n    display: inline-flex; align-items: center; gap: 10px;\n    color: #fff; text-decoration: none;\n  }\n  .nav-back {\n    font-family: var(--font-display);\n    font-size: 13px; letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--fg-2);\n    text-decoration: none;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: color .2s var(--ease-out);\n  }\n  .nav-back:hover { color: #fff; }\n\n  /* ===== PAGE ===== */\n  main {\n    max-width: 820px;\n    margin: 0 auto;\n    padding: clamp(56px, 8vw, 112px) var(--page-pad) clamp(80px, 10vw, 140px);\n  }\n\n  h1 {\n    font-family: var(--font-display);\n    text-transform: uppercase;\n    font-size: clamp(40px, 5.6vw, 72px);\n    line-height: 0.98;\n    letter-spacing: -0.015em;\n    margin: 0 0 12px;\n    color: #fff;\n  }\n  .meta {\n    font-family: var(--font-body);\n    color: var(--fg-3);\n    font-size: 13px;\n    margin: 0 0 48px;\n  }\n\n  h2 {\n    font-family: var(--font-display);\n    text-transform: uppercase;\n    font-size: 16px; letter-spacing: 0.02em;\n    margin: 40px 0 12px;\n    color: #fff;\n  }\n  p, li {\n    font-family: var(--font-body);\n    color: var(--fg-2);\n    font-size: 15.5px; line-height: 1.65;\n  }\n  p { margin: 0 0 12px; max-width: 72ch; }\n  ul { padding-left: 20px; margin: 0 0 12px; max-width: 72ch; }\n  li { margin-bottom: 6px; }\n  strong.term { color: #fff; font-weight: 600; }\n\n  .footnote {\n    margin-top: 56px;\n    padding-top: 24px;\n    border-top: 1px solid var(--border-subtle);\n    font-family: var(--font-body);\n    font-size: 12px; color: var(--fg-3);\n    font-style: italic;\n    max-width: 72ch;\n  }\n\n  /* ===== FOOTER ===== */\n  footer {\n    border-top: 1px solid var(--border-subtle);\n    padding: 32px var(--page-pad);\n    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;\n    font-family: var(--font-display); font-size: 11px; letter-spacing: 0.08em;\n    text-transform: uppercase; color: var(--fg-3);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav class=\"nav\">\n  <a href=\"index.html\" class=\"nav-brand\">\n    <span>KM<\u002Fspan><span>MX<\u002Fspan>\n  <\u002Fa>\n  <a href=\"index.html\" class=\"nav-back\">← Volver al inicio<\u002Fa>\n<\u002Fnav>\n\n<main>\n  <h1>Aviso de Privacidad<\u002Fh1>\n  <p class=\"meta\">Fecha de última actualización: 15 de abril de 2026<\u002Fp>\n\n  <h2>1. Identidad y domicilio del responsable<\u002Fh2>\n  <p>Bechus es el responsable del tratamiento de sus datos personales, con dirección de contacto electrónico: <a href=\"mailto:elbechus@gmail.com\">elbechus@gmail.com<\u002Fa>.<\u002Fp>\n\n  <h2>2. Datos personales que se recaban<\u002Fh2>\n  <p>En el uso de la aplicación KM MX, se podrán recabar los siguientes datos personales:<\u002Fp>\n  <ul>\n    <li><strong class=\"term\">Correo electrónico<\u002Fstrong> — al registrarse o iniciar sesión. Se almacena en Supabase.<\u002Fli>\n    <li><strong class=\"term\">Ubicación GPS<\u002Fstrong> — solo si el usuario activa \"Usar mi ubicación\". Uso inmediato únicamente; no se almacena.<\u002Fli>\n    <li><strong class=\"term\">Historial de recorridos<\u002Fstrong> (paradas, distancia, tiempo, zona) — al generar un recorrido. Se almacena en Supabase.<\u002Fli>\n  <\u002Ful>\n  <p>No se recaban datos sensibles en los términos del artículo 3, fracción VI de la LFPDPPP.<\u002Fp>\n\n  <h2>3. Finalidades del tratamiento<\u002Fh2>\n  <p>Sus datos personales serán utilizados para las siguientes finalidades primarias:<\u002Fp>\n  <ul>\n    <li>Autenticar su identidad mediante código OTP enviado al correo electrónico registrado.<\u002Fli>\n    <li>Mantener su sesión activa de forma segura en el dispositivo.<\u002Fli>\n    <li>Generar recorridos a pie personalizados en la Ciudad de México conforme a sus preferencias.<\u002Fli>\n    <li>Almacenar su historial de recorridos para consulta futura dentro de la aplicación.<\u002Fli>\n  <\u002Ful>\n  <p>La ubicación GPS, cuando el usuario decide proporcionarla, se utiliza exclusivamente para determinar el punto de inicio del recorrido durante esa sesión. Dicho dato no se almacena ni se transmite a terceros.<\u002Fp>\n  <p>No existen finalidades secundarias (mercadotecnia, publicidad o prospección comercial) en el tratamiento de sus datos.<\u002Fp>\n\n  <h2>4. Transferencia de datos a terceros<\u002Fh2>\n  <p><strong class=\"term\">Supabase, Inc.<\u002Fstrong> — Servicio de autenticación y base de datos en la nube. Servidores ubicados en US East (Ohio, Estados Unidos). <a href=\"https://supabase.io\" target=\"_blank\" rel=\"noopener\">supabase.io<\u002Fa><\u002Fp>\n  <p><strong class=\"term\">Google Maps<\u002Fstrong> — La app ofrece la opción de abrir un recorrido en Google Maps. Esta acción lanza una aplicación externa sujeta a la política de privacidad de Google. KM MX no transmite datos personales a Google Maps directamente.<\u002Fp>\n  <p>Bechus no vende, cede ni arrienda datos personales a terceros con fines comerciales o publicitarios.<\u002Fp>\n\n  <h2>5. Plazos de conservación<\u002Fh2>\n  <ul>\n    <li><strong class=\"term\">Correo electrónico<\u002Fstrong> — indefinido, hasta que el titular solicite su eliminación.<\u002Fli>\n    <li><strong class=\"term\">Historial de recorridos<\u002Fstrong> — indefinido, hasta que el titular solicite su eliminación.<\u002Fli>\n    <li><strong class=\"term\">Ubicación GPS<\u002Fstrong> — no se almacena.<\u002Fli>\n  <\u002Ful>\n\n  <h2>6. Medidas de seguridad<\u002Fh2>\n  <ul>\n    <li>Almacenamiento en base de datos con acceso restringido mediante autenticación.<\u002Fli>\n    <li>Transmisión de datos mediante conexiones cifradas (HTTPS / TLS).<\u002Fli>\n    <li>Persistencia de sesión local mediante almacenamiento seguro del dispositivo (expo-secure-store).<\u002Fli>\n  <\u002Ful>\n\n  <h2>7. Derechos ARCO<\u002Fh2>\n  <p>Usted tiene derecho a Acceder, Rectificar, Cancelar u Oponerse al tratamiento de sus datos personales, conforme a los artículos 22 al 27 de la LFPDPPP.<\u002Fp>\n  <p>Para ejercer sus derechos ARCO contacte a: <a href=\"mailto:elbechus@gmail.com?subject=Solicitud%20ARCO%20%E2%80%94%20KM%20MX\">elbechus@gmail.com<\u002Fa> — Asunto sugerido: <em>\"Solicitud ARCO — KM MX\"<\u002Fem>. Daremos respuesta en un plazo máximo de 20 días hábiles a partir de su recepción.<\u002Fp>\n\n  <h2>8. Cambios al Aviso de Privacidad<\u002Fh2>\n  <p>Bechus se reserva el derecho de modificar el presente Aviso en cualquier momento. Cualquier modificación será notificada a través de la aplicación o por correo electrónico. El uso continuo de la aplicación tras la notificación implicará la aceptación de las modificaciones.<\u002Fp>\n\n  <h2>9. Consentimiento<\u002Fh2>\n  <p>Al registrarse y usar KM MX, usted manifiesta haber leído y aceptado los términos del presente Aviso de Privacidad, y otorga su consentimiento para el tratamiento de sus datos personales conforme a lo aquí establecido.<\u002Fp>\n\n  <p class=\"footnote\">Elaborado conforme a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP), su Reglamento y los Lineamientos del Aviso de Privacidad publicados por el INAI.<\u002Fp>\n<\u002Fmain>\n\n<footer>\n  <span>© 2026 KM MX<\u002Fspan>\n  <span>hola@kmmxwalks.com<\u002Fspan>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
